<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Mon CV / Contact</title>
</head>
<body>
    <header>
        <h1 >CONTACT</h1>
    </header>
    <main>
        <form method="get">
            <label>NOM
                <input name="submitted-fname" autocomplete="family-name">
            </label>
            <br><br>
            <label>PRENOM
                <input name="submitted-name" autocomplete="name">
            </label>
            <br><br>
            <label>EMAIL
                <input name="submitted-mail" autocomplete="email">
            </label>
        </form>
        <br><br>
        <label>COMPETENCES</label>
    <input type="checkbox" id="JS">
      <label for="JS">Javascript</label>
      <input type="checkbox" id="PHP">
      <label for="PHP">PHP</label>
      <input type="checkbox" id="C">
      <label for="C">C#</label>
      <input type="checkbox" id="ruby">
      <label for="ruby">Ruby</label>
      <input type="checkbox" id="react">
      <label for="react">React</label>
      <input type="checkbox" id="node">
      <label for="node">NodeJS</label>
    <br><br>
    <label>GENRE</label>
    <input type="radio" id="homme" name="genre">
        <label for="homme">Homme</label>
        <input type="radio" id="femme" name="genre">
        <label for="femme">Femme</label>
        <input type="radio" id="na" name="genre">
        <label for="na">N/A</label>
    <br><br>
    <label>MESSAGE</label><br>
        <textarea name="message" rows="5" cols="35"> 
        </textarea>
       <br><br>
    <label>POSTE</label>
    <select name="poste">
        <option>Développeur</option>
        <option>Intégrateur</option>
        <option>Concepteur</option>
    </select><br><br>
    <button type="submit">ENVOYER</button>
    </form>
</main>
